version: '3.8'

services:
  usuario-service:
    image: usuario-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - MONGO_URI=mongodb+srv://jesushuaripaucar:angelo2024@cluster0.5houull.mongodb.net/usuariosdb?appName=Cluster0
    networks:
      - ms-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  ms-net:
    driver: overlay